name: "🎯 تست کیفیت فارسی GapGPT با خبر واقعی"

on:
  workflow_dispatch:  # فقط دستی اجرا بشه تا لاگش رو ببینی

jobs:
  test-gap-persian:
    runs-on: ubuntu-latest
    steps:
      - name: "📡 ارسال خبر فارسی به GapGPT و بررسی خروجی"
        run: |
          echo "========================================="
          echo "   تست کیفیت خروجی فارسی GapGPT"
          echo "   مدل: gemini-2.5-flash"
          echo "========================================="
          echo ""

          # ============================================
          # بخش ۱: تعریف API و مدل
          # ============================================
          API_URL="https://api.gapgpt.app/v1/chat/completions"
          MODEL="gemini-2.5-flash"

          # ============================================
          # بخش ۲: خبر نمونه (واقعی، فارسی)
          # ============================================
          # این یک خبر کوتاه به سبک خبرگزاری‌های ایران است
          NEWS_TEXT="قیمت سکه امامی امروز در بازار تهران با افزایش ۲ میلیون و ۸۰۰ هزار تومانی نسبت به روز گذشته، وارد کانال ۵۸ میلیون تومان شد. قیمت هر گرم طلای ۱۸ عیار نیز با رشد ۱.۵ درصدی به ۴ میلیون و ۸۵۰ هزار تومان رسید. کارشناسان دلیل این افزایش را نوسانات بازار ارز و افزایش تقاضا در آستانه تعطیلات عنوان کردند."

          # ============================================
          # بخش ۳: پرامپت (System Prompt)
          # ============================================
          # دقیقاً مشابه با اون چیزی که در processor.py
          # برای خلاصه‌سازی خبر روبیکا استفاده می‌کنیم
          SYSTEM_PROMPT="تو یک دستیار خبری حرفه‌ای برای ربات روبیکا هستی. لطفاً خبر زیر را به صورت خلاصه، جذاب و در **حداکثر ۳ خط** بازنویسی کن. فقط متن بازنویسی‌شده را برگردان و هیچ توضیح اضافه‌ای نده."

          echo "📰 خبر ورودی:"
          echo "\"$NEWS_TEXT\""
          echo ""
          echo "📝 System Prompt:"
          echo "\"$SYSTEM_PROMPT\""
          echo ""
          echo "⌛ در حال ارسال به GapGPT..."
          echo ""

          # ============================================
          # بخش ۴: ارسال درخواست با curl
          # ============================================
          # payload رو با jq می‌سازیم که escaping دستی نخوره
          PAYLOAD=$(jq -n \
            --arg model "$MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$NEWS_TEXT" \
            '{
              model: $model,
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              temperature: 0.7,
              max_tokens: 500
            }')

          # ارسال درخواست
          RESPONSE=$(curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GAPGPT_API_KEY }}" \
            -d "$PAYLOAD" \
            --connect-timeout 30 \
            --max-time 120)

          # ============================================
          # بخش ۵: نمایش پاسخ خام (برای دیباگ)
          # ============================================
          echo "📦 پاسخ خام JSON از سرور:"
          echo "-----------------------------------------"
          echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
          echo "-----------------------------------------"
          echo ""

          # ============================================
          # بخش ۶: استخراج و تحلیل
          # ============================================
          # استخراج متن پاسخ از JSON
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null)

          # استخراج وضعیت finish_reason
          FINISH_REASON=$(echo "$RESPONSE" | jq -r '.choices[0].finish_reason' 2>/dev/null)

          # استخراج تعداد توکن‌ها
          TOTAL_TOKENS=$(echo "$RESPONSE" | jq -r '.usage.total_tokens' 2>/dev/null)

          echo "═════════════════════════════════════════"
          echo "  📊 نتایج تست"
          echo "═════════════════════════════════════════"
          echo ""
          echo "🔹 Finish Reason: $FINISH_REASON"
          echo "🔹 Total Tokens : $TOTAL_TOKENS"
          echo ""

          if [ "$CONTENT" = "null" ] || [ -z "$CONTENT" ]; then
            echo "❌ خطا: نتوانستیم محتوای پاسخ را استخراج کنیم."
            echo "   پاسخ کامل JSON در بالا قابل مشاهده است."
            exit 1
          fi

          echo "🔹 خروجی نهایی مدل (محتوای بازنویسی‌شده):"
          echo "-----------------------------------------"
          echo "$CONTENT"
          echo "-----------------------------------------"
          echo ""

          # ============================================
          # بخش ۷: بررسی کیفیت (چک‌لیست ساده)
          # ============================================
          echo "📋 بررسی کیفیت:"
          echo ""

          # چک ۱: آیا خروجی فارسی است؟ (وجود حروف فارسی)
          if echo "$CONTENT" | grep -qP '[\x{0600}-\x{06FF}]' 2>/dev/null || \
             echo "$CONTENT" | grep -q '[آ-ی]' 2>/dev/null; then
            echo "   ✅ خروجی شامل حروف فارسی است."
          else
            echo "   ⚠️  هشدار: خروجی فاقد حروف فارسی است (ممکن است انگلیسی باشد)."
          fi

          # چک ۲: طول خروجی (نباید خیلی کوتاه یا خیلی بلند باشه)
          CHAR_COUNT=$(echo "$CONTENT" | wc -c)
          if [ "$CHAR_COUNT" -gt 30 ] && [ "$CHAR_COUNT" -lt 800 ]; then
            echo "   ✅ طول خروجی ($CHAR_COUNT کاراکتر) مناسب به نظر می‌رسد."
          elif [ "$CHAR_COUNT" -le 30 ]; then
            echo "   ⚠️  هشدار: خروجی بسیار کوتاه است ($CHAR_COUNT کاراکتر)."
          else
            echo "   ⚠️  هشدار: خروجی نسبتاً بلند است ($CHAR_COUNT کاراکتر)."
          fi

          # چک ۳: آیا finish_reason = stop (یعنی مدل خودش تموم کرده)
          if [ "$FINISH_REASON" = "stop" ]; then
            echo "   ✅ مدل به صورت طبیعی خروجی را تمام کرده است (finish_reason=stop)."
          else
            echo "   ⚠️  finish_reason=$FINISH_REASON (ممکن است ناقص باشد)."
          fi

          echo ""
          echo "═════════════════════════════════════════"
          echo "  ✅ تست با موفقیت به پایان رسید."
          echo "  لطفاً خروجی بالا را بررسی کنید."
          echo "  اگر کیفیت فارسی قابل قبول است،"
          echo "  می‌توانیم processor.py را بازنویسی کنیم."
          echo "═════════════════════════════════════════"
