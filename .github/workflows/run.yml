name: News Bot

on:
  workflow_dispatch:      # اجرای دستی
  schedule:
    - cron: '0 */6 * * *' # اجرای خودکار هر ۶ ساعت

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run script
        run: python news.py
