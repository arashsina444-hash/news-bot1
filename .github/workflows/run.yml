name: Run News Bot

on:
  workflow_dispatch:  # این خط جادویی است که دکمه را ظاهر می‌کند
  schedule:
    - cron: '0 * * * *' # هر ساعت اجرا شود

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser openai

      - name: Run news scraper
        run: python news.py

      - name: Generate AI posts (Rubika)
        env:
          GAPGPT_API_KEY: ${{ secrets.GAPGPT_API_KEY }}
        run: |
          echo "🚀 Starting AI Generation..."
          python processor.py

      - name: Commit and Push changes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.txt rubika_posts.txt
          git commit -m "Update news and AI posts" || echo "No changes to commit"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
