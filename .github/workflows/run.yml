name: Run News Bot

on:

workflow_dispatch:

schedule:

cron: ‘0 * * * *’
jobs:

run-bot:

runs-on: ubuntu-latest

steps:

name: Checkout repository
uses: actions/checkout@v3

name: Setup Python
uses: actions/setup-python@v4

with:

python-version: “3.9”

name: Install libraries
run: |

python -m pip install --upgrade pip

pip install feedparser openai requests urllib3

name: Run news scraper
run: python news.py

name: Generate AI posts
env:

GAPGPT_API_KEY: ${{ secrets.GAPGPT_API_KEY }}

run: python processor.py

name: Commit files
env:

GH_TOKEN: ${{ secrets.GH_TOKEN }}

run: |

git config --global user.name “github-actions”

git config --global user.email “actions@github.com”

git add news.txt rubika_posts.txt

git commit -m “auto update” || echo “nothing to commit”

git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
